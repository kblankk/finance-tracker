{% extends 'base.html' %}
{% block title %}Aguardando Aprovacao - FinanceTracker{% endblock %}

{% block auth_content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 text-center">
            <div class="card-body p-5">
                <i class="bi bi-hourglass-split display-1 text-warning mb-3"></i>
                <h3>Aguardando Aprovacao</h3>
                <p class="text-muted mb-4">
                    Sua conta foi criada com sucesso! O administrador precisa aprovar seu acesso.
                    Voce sera notificado quando sua conta for ativada.
                </p>
                <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-box-arrow-left me-1"></i> Sair
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
