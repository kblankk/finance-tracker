<div class="card border-0 mb-3">
    <div class="card-body py-2">
        <form method="GET" class="row g-2 align-items-end">
            {% if filter_status is defined %}
            <input type="hidden" name="status" value="{{ filter_status }}">
            {% endif %}
            <div class="col-md-2">
                <label class="form-label small mb-1">Data Inicio</label>
                <input type="date" name="date_from" class="form-control form-control-sm" value="{{ filters.date_from or '' }}">
            </div>
            <div class="col-md-2">
                <label class="form-label small mb-1">Data Fim</label>
                <input type="date" name="date_to" class="form-control form-control-sm" value="{{ filters.date_to or '' }}">
            </div>
            <div class="col-md-2">
                <label class="form-label small mb-1">Categoria</label>
                <select name="category_id" class="form-select form-select-sm">
                    <option value="">Todas</option>
                    {% for id, name in categories %}
                    <option value="{{ id }}" {{ 'selected' if filters.category_id|string == id|string }}>{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-1">
                <label class="form-label small mb-1">Min R$</label>
                <input type="number" name="amount_min" step="0.01" class="form-control form-control-sm" value="{{ filters.amount_min or '' }}">
            </div>
            <div class="col-md-1">
                <label class="form-label small mb-1">Max R$</label>
                <input type="number" name="amount_max" step="0.01" class="form-control form-control-sm" value="{{ filters.amount_max or '' }}">
            </div>
            <div class="col-md-2">
                <label class="form-label small mb-1">Buscar</label>
                <input type="text" name="search" class="form-control form-control-sm" placeholder="Descricao..." value="{{ filters.search or '' }}">
            </div>
            <div class="col-md-2 d-flex gap-1">
                <button type="submit" class="btn btn-primary btn-sm flex-grow-1">
                    <i class="bi bi-funnel me-1"></i>Filtrar
                </button>
                <a href="{{ request.path }}" class="btn btn-outline-secondary btn-sm" title="Limpar">
                    <i class="bi bi-x-lg"></i>
                </a>
            </div>
        </form>
    </div>
</div>
