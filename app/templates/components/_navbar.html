<nav class="navbar navbar-expand border-bottom border-secondary px-4">
    <button class="btn btn-sm btn-outline-secondary d-md-none me-3" id="sidebarToggle">
        <i class="bi bi-list"></i>
    </button>

    <div class="ms-auto d-flex align-items-center gap-3">
        <!-- Privacy toggle -->
        <button class="btn btn-sm btn-outline-secondary" id="privacyToggle" title="Esconder valores">
            <i class="bi bi-eye" id="privacyIcon"></i>
        </button>

        <!-- Theme toggle -->
        <button class="btn btn-sm btn-outline-secondary" id="themeToggle" title="Alternar tema">
            <i class="bi bi-moon-stars" id="themeIcon"></i>
        </button>

        <!-- Profile -->
        <a href="{{ url_for('profile.settings') }}" class="btn btn-sm btn-outline-secondary" title="Meu Perfil">
            <i class="bi bi-person-gear"></i>
        </a>

        <!-- Notifications -->
        <a href="{{ url_for('reminders.list') }}" class="btn btn-sm btn-outline-secondary position-relative">
            <i class="bi bi-bell"></i>
            <span class="notification-badge d-none" id="notifBadge"></span>
        </a>

        <!-- Logout -->
        <a href="{{ url_for('auth.logout') }}" class="btn btn-sm btn-outline-danger">
            <i class="bi bi-box-arrow-right me-1"></i> Sair
        </a>
    </div>
</nav>

<script>
// Theme toggle
const toggle = document.getElementById('themeToggle');
const icon = document.getElementById('themeIcon');
const html = document.documentElement;

const savedTheme = localStorage.getItem('ft-theme') || 'dark';
html.setAttribute('data-bs-theme', savedTheme);
icon.className = savedTheme === 'dark' ? 'bi bi-moon-stars' : 'bi bi-sun';

toggle.addEventListener('click', () => {
    const current = html.getAttribute('data-bs-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-bs-theme', next);
    localStorage.setItem('ft-theme', next);
    icon.className = next === 'dark' ? 'bi bi-moon-stars' : 'bi bi-sun';
});

// Sidebar toggle (mobile)
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebarBackdrop');
    sidebar.classList.toggle('show');
    if (backdrop) backdrop.classList.toggle('show');
}

const sidebarBtn = document.getElementById('sidebarToggle');
if (sidebarBtn) {
    sidebarBtn.addEventListener('click', toggleSidebar);
}

// Menu button (bottom nav)
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
if (mobileMenuBtn) {
    mobileMenuBtn.addEventListener('click', toggleSidebar);
}

// Fechar sidebar ao clicar no backdrop
const backdrop = document.getElementById('sidebarBackdrop');
if (backdrop) {
    backdrop.addEventListener('click', toggleSidebar);
}

// Privacy toggle - esconder valores
const privacyToggle = document.getElementById('privacyToggle');
const privacyIcon = document.getElementById('privacyIcon');

function applyPrivacy(hidden) {
    document.body.classList.toggle('privacy-mode', hidden);
    privacyIcon.className = hidden ? 'bi bi-eye-slash' : 'bi bi-eye';
    privacyToggle.title = hidden ? 'Mostrar valores' : 'Esconder valores';
}

const savedPrivacy = localStorage.getItem('ft-privacy') === 'true';
applyPrivacy(savedPrivacy);

privacyToggle.addEventListener('click', () => {
    const next = !document.body.classList.contains('privacy-mode');
    localStorage.setItem('ft-privacy', next);
    applyPrivacy(next);
    window.dispatchEvent(new CustomEvent('ft-privacy-change', { detail: { hidden: next } }));
});

// Notification badge
fetch('{{ url_for("reminders.api_unread_count") }}')
    .then(r => r.json())
    .then(data => {
        if (data.count > 0) {
            const badge = document.getElementById('notifBadge');
            badge.textContent = data.count;
            badge.classList.remove('d-none');
        }
    })
    .catch(() => {});
</script>
