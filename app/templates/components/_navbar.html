<nav class="navbar navbar-expand border-bottom border-secondary px-4">
    <button class="btn btn-sm btn-outline-secondary d-md-none me-3" id="sidebarToggle">
        <i class="bi bi-list"></i>
    </button>

    <div class="ms-auto d-flex align-items-center gap-3">
        <!-- Theme toggle -->
        <button class="btn btn-sm btn-outline-secondary" id="themeToggle" title="Alternar tema">
            <i class="bi bi-moon-stars" id="themeIcon"></i>
        </button>

        <!-- Notifications -->
        <a href="{{ url_for('reminders.list') }}" class="btn btn-sm btn-outline-secondary position-relative">
            <i class="bi bi-bell"></i>
            <span class="notification-badge d-none" id="notifBadge"></span>
        </a>

        <!-- Logout -->
        <a href="{{ url_for('auth.logout') }}" class="btn btn-sm btn-outline-danger">
            <i class="bi bi-box-arrow-right me-1"></i> Sair
        </a>
    </div>
</nav>

<script>
// Theme toggle
const toggle = document.getElementById('themeToggle');
const icon = document.getElementById('themeIcon');
const html = document.documentElement;

const savedTheme = localStorage.getItem('ft-theme') || 'dark';
html.setAttribute('data-bs-theme', savedTheme);
icon.className = savedTheme === 'dark' ? 'bi bi-moon-stars' : 'bi bi-sun';

toggle.addEventListener('click', () => {
    const current = html.getAttribute('data-bs-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-bs-theme', next);
    localStorage.setItem('ft-theme', next);
    icon.className = next === 'dark' ? 'bi bi-moon-stars' : 'bi bi-sun';
});

// Sidebar toggle (mobile)
const sidebarBtn = document.getElementById('sidebarToggle');
if (sidebarBtn) {
    sidebarBtn.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('show');
    });
}

// Notification badge
fetch('{{ url_for("reminders.api_unread_count") }}')
    .then(r => r.json())
    .then(data => {
        if (data.count > 0) {
            const badge = document.getElementById('notifBadge');
            badge.textContent = data.count;
            badge.classList.remove('d-none');
        }
    })
    .catch(() => {});
</script>
